name: Portable build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: ${{ matrix.os }} / Node 22
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Reject machine-specific paths
        run: npm run check:portability

      - name: Run tests
        run: npm test

      - name: Type-check
        run: npm run typecheck

      - name: Build production bundle
        run: npm run build
